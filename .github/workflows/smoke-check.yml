name: Smoke Check

on:
  push:
    branches:
      - main
      - cursor/an-lise-de-projeto-abrangente-6b68
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run lightweight smoke checks
        run: node smoke-check.js
