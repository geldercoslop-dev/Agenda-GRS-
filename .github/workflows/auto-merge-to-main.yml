name: Auto Merge Feature Branch to Main

on:
  push:
    branches:
      - cursor/an-lise-de-projeto-abrangente-6b68
  workflow_dispatch:

concurrency:
  group: auto-merge-feature-main
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge feature branch into main
        run: |
          git fetch origin main
          git checkout main
          git pull origin main
          git merge --no-ff origin/cursor/an-lise-de-projeto-abrangente-6b68 -m "Auto-merge: sync feature branch into main"

      - name: Push merged main
        run: git push origin main

      - name: Trigger Vercel production deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::error::Secret VERCEL_DEPLOY_HOOK_URL não configurado no GitHub."
            exit 1
          fi

          echo "Disparando deploy automático na Vercel após auto-merge..."
          http_code="$(curl -sS -o /tmp/vercel-hook-response.txt -w "%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK_URL")"
          cat /tmp/vercel-hook-response.txt || true

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Falha ao disparar deploy na Vercel (HTTP $http_code)."
            exit 1
          fi

          echo "Deploy automático na Vercel disparado com sucesso."
